services:
  swimpool_mysql8:
    container_name: "mysql8_container"
    image: "mysql:8.4.5"
    restart: "always"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234@
      TZ: Asia/Seoul
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - my_vnetwork

  backend-server:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: "backend-container"
    image: "backend-server:0.0.1"
    restart: "always"
    ports:
      - "80:80"
    env_file:
      - .env.local
    environment:
      DB_IP: localhost
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      TZ: Asia/Seoul
    depends_on:
      swimpool_mysql8:
        condition: service_healthy
    networks:
      - my_vnetwork

networks:
  my_vnetwork:
    driver: bridge
