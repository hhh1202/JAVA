spring:
  application:
    name: sbsecurity_login
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/auth_spring_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: auth_spring_user
    password: qwer1234!
  jpa:
    hibernate:
      ddl-auto: update # Entity ? ????? ??? ???? ??????? ???? ?????.
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
      dialect: org.hibernate.dialect.MySQL8InnoDBDialect
  mustache:
    suffix: .html
    servlet:
      cache: false
      expose-request-attributes: true
    charset: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
server:
  port: 8082

kind: Application