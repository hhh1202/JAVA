services:
  mysql-hhh:
    image: mysql:latest
    container_name: mysql-hhh
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: q1w2e3r4
    ports:
      - "3306:3306"
    # 아래 내용을 추가합니다
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql_data:/var/lib/mysql
